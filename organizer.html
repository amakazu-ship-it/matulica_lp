<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>主催者向け - Matulica</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Poppins:wght@800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #2DBD8F;
  --green-dark: #1A9B72;
  --green-light: #E8F7F2;
  --dark: #132018;
  --text: #2D3748;
  --text-light: #718096;
  --yellow: #F5C842;
}
body { font-family: 'Noto Sans JP', sans-serif; background: #fff; overflow-x: hidden; }

nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(45,189,143,0.12);
  padding: 0 48px; height: 64px;
  display: flex; align-items: center; justify-content: space-between;
}
.nav-logo { font-family: 'Poppins', sans-serif; font-weight: 800; font-size: 20px; color: var(--green); text-decoration: none; }
.nav-back { color: var(--text-light); font-size: 14px; text-decoration: none; display: flex; align-items: center; gap: 6px; transition: color 0.2s; }
.nav-back:hover { color: var(--green); }

/* HERO */
.org-hero {
  background: var(--dark);
  padding: 72px 60px;
  text-align: center;
}
.org-hero h1 { font-size: clamp(28px, 4vw, 44px); font-weight: 900; color: #fff; line-height: 1.3; margin-bottom: 16px; }
.org-hero p { color: rgba(255,255,255,0.6); font-size: 16px; line-height: 1.8; max-width: 560px; margin: 0 auto; }

/* DASHBOARD IMAGES */
.dash-section { background: var(--dark); padding: 0 60px 72px; }
.dash-grid { display: grid; grid-template-columns: 1fr; gap: 24px; max-width: 1000px; margin: 0 auto; }
.dash-grid img { width: 100%; border-radius: 14px; box-shadow: 0 8px 40px rgba(0,0,0,0.4); display: block; }

/* FORM SECTION */
.form-section { background: linear-gradient(135deg, #E8F7F2, #cef0e2); padding: 80px 48px; }
.form-wrap { max-width: 600px; margin: 0 auto; text-align: center; }
.form-eyebrow { font-size: 14px; font-weight: 600; color: var(--green-dark); margin-bottom: 8px; }
.form-h2 { font-size: clamp(24px, 3.5vw, 36px); font-weight: 900; color: var(--dark); margin-bottom: 6px; }
.form-sub { font-size: 14px; color: var(--text-light); margin-bottom: 28px; }
.iframe-box { background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
.iframe-box iframe { width: 100%; border: none; display: block; }

footer { background: var(--dark); padding: 28px 48px; border-top: 1px solid rgba(255,255,255,0.06); }
.footer-inner { max-width: 960px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
.footer-logo { font-family: 'Poppins', sans-serif; font-weight: 800; font-size: 18px; color: var(--green); }
.footer-links { display: flex; gap: 20px; }
.footer-links a { color: rgba(255,255,255,0.4); text-decoration: none; font-size: 12px; transition: color 0.2s; }
.footer-links a:hover { color: var(--green); }
.footer-copy { width: 100%; text-align: center; font-size: 11px; color: rgba(255,255,255,0.25); margin-top: 12px; }

@media (max-width: 768px) {
  nav { padding: 0 16px; }
  .org-hero { padding: 48px 20px; }
  .dash-section { padding: 0 16px 48px; }
  .form-section { padding: 48px 16px; }
  footer { padding: 24px 16px; }
}
</style>
</head>
