<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matulica - まちを楽しもう、アプリひとつで</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Poppins:wght@800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #2DBD8F;
  --green-dark: #1A9B72;
  --dark: #132018;
  --text: #2D3748;
  --text-light: #718096;
  --yellow: #F5C842;
}
body { font-family: 'Noto Sans JP', sans-serif; background: #fff; overflow-x: hidden; }

nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(45,189,143,0.12);
  padding: 0 48px; height: 64px;
  display: flex; align-items: center; justify-content: space-between; gap: 32px;
}
.nav-logo { font-family: 'Poppins', sans-serif; font-weight: 800; font-size: 20px; color: var(--green); text-decoration: none; flex-shrink: 0; }
.nav-links { display: flex; gap: 28px; list-style: none; flex: 1; justify-content: center; }
.nav-links a { text-decoration: none; color: var(--text); font-size: 14px; font-weight: 500; transition: color 0.2s; }
.nav-links a:hover { color: var(--green); }
.nav-cta { background: var(--yellow); color: #5a4000; border-radius: 24px; padding: 10px 22px; font-size: 14px; font-weight: 700; text-decoration: none; flex-shrink: 0; transition: opacity 0.2s; }
.nav-cta:hover { opacity: 0.85; }

/* 画像＋クリッカブルエリア */
.lp-wrap { position: relative; line-height: 0; }
.lp-wrap img { width: 100%; display: block; }
.img-btn {
  position: absolute;
  cursor: pointer;
  /* デバッグ用: background: rgba(255,0,0,0.2); */
}

/* 先行登録セクション */
.registration { background: linear-gradient(135deg, #E8F7F2, #cef0e2); padding: 80px 48px; }
.reg-wrap { max-width: 600px; margin: 0 auto; text-align: center; }
.reg-eyebrow { font-size: 14px; font-weight: 600; color: var(--green-dark); margin-bottom: 8px; }
.reg-h2 { font-size: clamp(26px, 4vw, 40px); font-weight: 900; color: var(--dark); margin-bottom: 6px; }
.reg-sub { font-size: 14px; color: var(--text-light); margin-bottom: 28px; }
.iframe-box { background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
.iframe-box iframe { width: 100%; border: none; display: block; }

footer { background: var(--dark); padding: 28px 48px; }
.footer-inner { max-width: 960px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
.footer-logo { font-family: 'Poppins', sans-serif; font-weight: 800; font-size: 18px; color: var(--green); }
.footer-links { display: flex; gap: 20px; }
.footer-links a { color: rgba(255,255,255,0.4); text-decoration: none; font-size: 12px; transition: color 0.2s; }
.footer-links a:hover { color: var(--green); }
.footer-copy { width: 100%; text-align: center; font-size: 11px; color: rgba(255,255,255,0.25); margin-top: 12px; }

@media (max-width: 768px) {
  nav { padding: 0 16px; }
  .nav-links { display: none; }
  .registration { padding: 48px 16px; }
  footer { padding: 24px 16px; }
}
</style>
</head>

</nav>
